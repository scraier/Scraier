<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scraier</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;500&family=Barlow:wght@300;400;500&display=swap');

:root {
--bg: #080b0f;
--surface: #0c1118;
--border: #1c2b3a;
--accent: #00d4ff;
--green: #00ff88;
--yellow: #ffcc00;
--purple: #a855f7;
--text: #e0eff8;
--text2: #6a95b0;
--text3: #3a6080;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow-x: hidden;
}

body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px);
  background-size: 50px 50px;
  pointer-events:none;
  z-index:0;
}

.container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 900px;
  padding: 60px 24px;
  text-align: center;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 72px;
  letter-spacing: 16px;
  color: var(--accent);
  text-shadow: 0 0 60px rgba(0,212,255,0.3);
  margin-bottom: 8px;
}

.tagline {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 4px;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 70px;
}

.apps {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-bottom: 60px;
}

.app-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 36px 24px;
  text-decoration: none;
  transition: all 0.25s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  position: relative;
  overflow: hidden;
}

.app-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  transition: opacity 0.25s;
}

.app-card.edge::before { background: var(--accent); }
.app-card.vault::before { background: var(--green); }
.app-card.field::before { background: var(--yellow); opacity: 0.4; }

.app-card:hover {
  transform: translateY(-4px);
  border-color: #243447;
}

.app-card.edge:hover { box-shadow: 0 8px 30px rgba(0,212,255,0.1); }
.app-card.vault:hover { box-shadow: 0 8px 30px rgba(0,255,136,0.1); }
.app-card.field:hover { box-shadow: 0 8px 30px rgba(255,204,0,0.08); }

.app-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  letter-spacing: 6px;
}

.app-card.edge .app-name { color: var(--accent); }
.app-card.vault .app-name { color: var(--green); }
.app-card.field .app-name { color: var(--yellow); opacity: 0.5; }

.app-desc {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--text3);
  text-transform: uppercase;
  line-height: 1.6;
}

.app-status {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  padding: 4px 10px;
  border-radius: 4px;
  margin-top: 4px;
}

.status-live {
  background: rgba(0,255,136,0.08);
  color: var(--green);
  border: 1px solid rgba(0,255,136,0.2);
}

.status-soon {
  background: rgba(255,204,0,0.06);
  color: var(--yellow);
  border: 1px solid rgba(255,204,0,0.15);
  opacity: 0.6;
}

.footer {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 2px;
}

@media(max-width: 600px) {
  .logo { font-size: 52px; letter-spacing: 10px; }
  .apps { grid-template-columns: 1fr; max-width: 320px; margin: 0 auto 50px; }
}
</style>
</head>
<body>
<div class="container">

  <div class="logo">SCRAIER</div>
  <div class="tagline">Tools built from the field up</div>

  <div class="apps">

    <a href="edge-journal.html" class="app-card edge">
      <div class="app-name">EDGE</div>
      <div class="app-desc">Trading Journal<br>123 System</div>
      <div class="app-status status-live">LIVE</div>
    </a>

    <a href="vault.html" class="app-card vault">
      <div class="app-name">VAULT</div>
      <div class="app-desc">Financial<br>Intelligence</div>
      <div class="app-status status-live">LIVE</div>
    </a>

    <a href="#" class="app-card field">
      <div class="app-name">FIELD</div>
      <div class="app-desc">Job Site<br>Management</div>
      <div class="app-status status-soon">COMING SOON</div>
    </a>

  </div>

  <div class="footer">© 2026 SCRAIER — ALL RIGHTS RESERVED</div>

</div>
</body>
</html>
